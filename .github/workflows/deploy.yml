name: Daily Cron Deploy

on:
  schedule:
    # Runs at exactly 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allows you to manually trigger it from the GitHub Actions tab to test it
  workflow_dispatch: 

jobs:
  trigger-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Deploy Hook
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
